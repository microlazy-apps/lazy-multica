package: cloud.lazycat.app.lazy-multica
version: ${VERSION}

name: Multica
description: 开源托管式 AI 编码代理平台 — 给 AI agent 派任务、跟进度、复用技能
author: multica-ai
license: Apache-2.0-modified
homepage: https://github.com/microlazy-apps/lazy-multica

unsupported_platforms:
  - ios
  - android

locales:
  zh-CN:
    name: Multica
    description: 开源的托管式 AI 编码代理平台。把 Claude Code、Codex、Copilot CLI、Gemini、Cursor Agent 等 AI agent 当成真正的"远程同事"使用 — 派工单、跟进度、积累可复用技能。
    usage: |
      ## 默认登录方式（开箱即用）
      1. 访问 `https://multica.<your-box>.heiyu.space`
      2. 邮箱填**任意值**（如 `me@example.com`），点"发送验证码"
      3. 验证码输入框里填默认值 **`888888`** → 即可登录

      "固定登录验证码"已默认设为 `888888`，所以不需要配置任何
      邮件服务。⚠️ 公网可达的盒子建议在「应用设置」清空此参数，
      改用随机验证码（验证码会打印到 backend 容器日志）。

      ## 派活给 AI agent（在你本地机器上）
      1. 在你的本地机器安装 `multica` CLI：
         ```sh
         brew install multica-ai/tap/multica
         multica setup self-host \
           --server-url https://multica.<your-box>.heiyu.space \
           --app-url    https://multica.<your-box>.heiyu.space
         ```
      2. 在 Web UI 的「Settings → Agents」创建 agent，把 issue 派给它
      3. agent 在你本地机器上自动接活、跑代码、回报结果

      ## 资源占用
      - 推荐配置：≥ 2 核 CPU，≥ 2GB 内存
      - 自带 PostgreSQL 17 (pgvector) 一个内置依赖

      ## 数据持久化
      - PostgreSQL 数据：/lzcapp/var/postgres
      - 上传文件：/lzcapp/var/uploads

      ## 上游 / 重打包说明
      上游项目（修改版 Apache-2.0）：https://github.com/multica-ai/multica
      本仓库（懒猫包装）：https://github.com/microlazy-apps/lazy-multica
      仅做镜像重打包 — 不修改 multica 源码、镜像或前端 LOGO。
      上游 license 禁止移除/修改前端 LOGO 和版权信息，请勿对前端做二次定制。
  en:
    name: Multica
    description: Open-source managed AI coding agents platform. Turn coding CLIs (Claude Code, Codex, Copilot CLI, Gemini, Cursor Agent, ...) into real teammates — assign tasks, track progress, compound reusable skills.
    usage: |
      ## Default login (zero-config)
      1. Open `https://multica.<your-box>.heiyu.space`
      2. Email: **any value** (e.g. `me@example.com`), click "Send code"
      3. Verification code: **`888888`** → you're in.

      The deploy param "Fixed verification code" defaults to `888888`,
      so no email service is required for first login. ⚠️ For
      publicly-reachable boxes, clear this param in the app settings
      and use random codes (printed to the `backend` container logs).

      ## Run AI agents on your own machine
      1. Install the `multica` CLI locally:
         ```sh
         brew install multica-ai/tap/multica
         multica setup self-host \
           --server-url https://multica.<your-box>.heiyu.space \
           --app-url    https://multica.<your-box>.heiyu.space
         ```
      2. In the web UI, go to Settings → Agents to create an agent, then
         assign issues to it.
      3. The agent runs locally on your machine, picks up tasks, and
         reports progress to your workspace.

      ## Resource requirements
      - Recommended: ≥ 2 vCPU, ≥ 2 GB RAM
      - Bundles PostgreSQL 17 with pgvector internally

      ## Persistent data
      - PostgreSQL data: /lzcapp/var/postgres
      - Uploads:         /lzcapp/var/uploads

      ## Upstream / repackaging note
      Upstream project (modified Apache-2.0): https://github.com/multica-ai/multica
      This wrapper repo: https://github.com/microlazy-apps/lazy-multica
      Image-only repackaging — no source modification, no frontend logo
      modification (the upstream license forbids it).
